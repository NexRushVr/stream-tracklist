name: tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Daily at 06:00 UTC. Catches deps drift (shazamio, spotipy, etc.).
    - cron: "0 6 * * *"
  workflow_dispatch:

# Cancel superseded runs on the same branch / PR so a quick push burst
# doesn't burn fresh matrices per commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # Fast suite: only pytest is installed. Runtime modules guard their heavy
  # imports with try/except so the pure-logic tests can still run against this
  # minimal install. Matrix covers every supported Python on Linux, plus
  # Windows on 3.12 since the tool is Windows-first in practice.
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]
        include:
          - os: windows-latest
            python-version: "3.12"
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            requirements-test.txt

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run pytest
        run: pytest -v

  # Smoke job: install the full runtime stack and import every module to catch
  # upstream API breaks that the lazy-import guard would otherwise hide. Runs
  # only on one Python version because this is a deps-drift signal, not a
  # correctness matrix.
  smoke-import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install full runtime
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import every module
        run: |
          python -c "from src import extractor, output, recognizer, source, spotify_client, streamer_log; assert recognizer.Shazam is not None, 'shazamio guard masked an ImportError'; assert spotify_client.spotipy is not None, 'spotipy guard masked an ImportError'"
